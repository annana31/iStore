<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iStore - Cart</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* Reset & base */
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #fafafa;
    margin: 0;
    padding: 0 20px 40px 20px; /* ✅ no top padding */
    color: #222;
}

  a {
    color: #0071e3;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  /* Container */
  .cart-wrapper {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Heading */
  h1 {
    font-weight: 700;
    font-size: 28px;
    margin-top: 70px;
    margin-bottom: 50px;
    text-align: center;
  }

  /* Cart Table */
  table.cart-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  table.cart-table thead {
    background: #f9f9f9;
  }

  table.cart-table th, table.cart-table td {
    padding: 16px 20px;
    text-align: left;
    vertical-align: middle;
    border-bottom: 1px solid #eee;
  }

  table.cart-table th {
    font-weight: 600;
    font-size: 16px;
    color: #555;
  }

  table.cart-table tbody tr:last-child td {
    border-bottom: none;
  }

  /* Item Cell */
  .item-cell {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .item-image {
    width: 80px;
    height: 80px;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .item-details {
    max-width: 300px;
  }

  .item-name {
    font-weight: 700;
    font-size: 18px;
    margin: 0 0 6px 0;
  }

  .item-meta {
    font-size: 13px;
    color: #777;
  }

  .item-meta span {
    display: inline-block;
    margin-right: 10px;
    font-weight: 500;
  }

  /* Color and Storage badges */
  .badge {
    display: inline-block;
    background: #e1eaff;
    color: #3b5edd;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    margin-right: 6px;
  }

  /* Quantity Cell */
  .qty-cell {
    font-size: 16px;
    font-weight: 600;
  }

  /* Price & Total */
  .price-cell, .total-cell {
    font-weight: 600;
    font-size: 16px;
  }

  /* Remove Button */
  .remove-btn {
    background: transparent;
    border: none;
    color: #c0392b;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 0;
    transition: color 0.2s ease;
  }
  .remove-btn:hover {
    color: #e74c3c;
  }

  /* Summary Box */
  .summary-box {
    margin-top: 40px;
    max-width: 400px;
    background: #fff;
    padding: 25px 30px;
    border-radius: 10px;
    box-shadow: 0 0 16px rgba(0,0,0,0.07);
    float: right;
    text-align: center;
  }

  .summary-row.total {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #222;
  }

  /* Checkout Button */
  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: #0071e3;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .checkout-btn:hover {
    background: #005bb5;
  }

  /* Minimalist Top Navbar */
  header.minimal-navbar {
    background: #fff;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  header.minimal-navbar a,
  header.minimal-navbar .account-btn {
    font-weight: 600;
    color: #0071e3;
    cursor: pointer;
    text-decoration: none;
  }

  header.minimal-navbar .dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 30px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 8px 0;
    min-width: 120px;
  }

  header.minimal-navbar .dropdown-menu button {
    width: 100%;
    padding: 8px 12px;
    border: none;
    background: none;
    text-align: left;
    font-weight: 600;
    color: #c0392b;
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 700px) {
    body {
      padding: 20px 10px;
    }
    .summary-box {
      float: none;
      max-width: 100%;
      margin: 40px 0 0 0;
    }
  }
</style>
</head>
<body>

 <header>
    <div class="nav-right" style="margin-left:auto; display:flex; gap:25px; align-items:center;">

        <!-- HOME -->
        <span class="cart" onclick="window.location.href='store.php'" style="cursor:pointer;">
            Home
        </span>

        <!-- ACCOUNT DROPDOWN -->
        <div class="profile-dropdown" id="profile-dropdown">
            <span class="account-btn">Account ▾</span>
            <div class="dropdown-menu" id="dropdown-menu">
                <button id="logout-btn">Logout</button>
            </div>
        </div>

    </div>
</header>

<div class="cart-wrapper">
  <h1>Your Cart (<span id="cart-count">0</span> items)</h1>

 <!-- Cart Table Container -->
<table class="cart-table">
  <thead>
    <tr>
      <th>Item</th>
      <th>Storage</th>
      <th>Color</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Remove</th>
    </tr>
  </thead>
  <tbody id="cart-items">
    <!-- Items injected here -->
  </tbody>
</table>

<div class="summary-box" aria-label="Order summary">
  <div class="summary-row total">
    <span class="label">Total:</span>
    <span id="final-total">$0.00</span>
  </div>
  <button class="checkout-btn" type="button">Check out</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const cartItemsContainer = document.getElementById("cart-items");
  const finalTotalEl = document.getElementById("final-total");
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function formatPrice(num) {
    return "$" + num.toFixed(2);
  }

  function updateTotals() {
    let total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    finalTotalEl.textContent = "$" + total.toFixed(2);
  }

  function renderCart() {
    cartItemsContainer.innerHTML = "";

    if (cart.length === 0) {
      cartItemsContainer.innerHTML = `
        <tr><td colspan="7" style="text-align:center; padding: 40px; font-size: 18px; color: #666;">Your cart is empty.</td></tr>
      `;
      updateTotals();
      return;
    }

    cart.forEach((item, index) => {
      cartItemsContainer.innerHTML += `
        <tr>
          <td class="item-cell">
            <img src="${item.image || ''}" alt="${item.name}" style="width:60px; height:60px; object-fit:cover; margin-right:10px;">
            ${item.name}
          </td>
          <td>${item.storage || '-'}</td>
          <td>${item.color || '-'}</td>
          <td>${formatPrice(item.price)}</td>
          <td>${item.quantity}</td>
          <td>${formatPrice(item.price * item.quantity)}</td>
          <td>
            <button class="remove-btn" data-index="${index}" aria-label="Remove ${item.name}">&times;</button>
          </td>
        </tr>
      `;
    });

    // Remove item functionality
    document.querySelectorAll(".remove-btn").forEach(btn => {
      btn.addEventListener("click", e => {
        const idx = parseInt(e.target.getAttribute("data-index"));
        cart.splice(idx, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        updateTotals();
      });
    });

    updateTotals();
  }

  renderCart();

  // ACCOUNT DROPDOWN
  const profileDropdown = document.querySelector(".profile-dropdown");
  const dropdownMenu = profileDropdown.querySelector(".dropdown-menu");
  const logoutBtn = document.getElementById("logout-btn");

  profileDropdown.addEventListener("click", e => {
    e.stopPropagation();
    dropdownMenu.style.display = dropdownMenu.style.display === "block" ? "none" : "block";
  });

  document.addEventListener("click", () => {
    dropdownMenu.style.display = "none";
  });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("cart");
    window.location.href = "login.html";
  });
});
</script>

</body>
</html>
