<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStore - Cart</title>

<style>

/* ===== GLOBAL ===== */
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    color:#111;
}

/* ===== NAVBAR ===== */
header{
    background:#fff;
    border-bottom:1px solid #e5e5e5;
    padding:14px 40px;
    display:flex;
    justify-content:flex-end;
    position:sticky;
    top:0;
    z-index:1000;
}

.nav-right{
    display:flex;
    gap:28px;
    align-items:center;
    font-weight:500;
}

.cart{
    cursor:pointer;
    color:#111;
}

.profile-dropdown{
    position:relative;
    cursor:pointer;
}

.dropdown-menu{
    display:none;
    position:absolute;
    right:0;
    top:30px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    overflow:hidden;
}

.dropdown-menu button{
    padding:10px 18px;
    width:100%;
    border:none;
    background:none;
    cursor:pointer;
}

.dropdown-menu button:hover{
    background:#f4f4f4;
}

/* ===== PAGE TITLE ===== */
h1{
    text-align:center;
    font-size:32px;
    font-weight:600;
    margin-top:70px;
    margin-bottom:50px;
}

/* ===== CART TABLE ===== */
.cart-wrapper{
    max-width:1200px;
    margin:auto;
}

.cart-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.cart-table th{
    text-align:left;
    padding:18px;
    font-size:14px;
    background:#fafafa;
    color:#555;
}

.cart-table td{
    padding:18px;
    border-bottom:1px solid #eee;
}

.cart-table tr:last-child td{
    border-bottom:none;
}

/* ===== PRODUCT CELL ===== */
.item-cell{
    display:flex;
    align-items:center;
    gap:15px;
}

.item-cell img{
    width:60px;
    height:60px;
    object-fit:contain;
}

/* ===== PRICE ===== */
.price-cell,
.total-cell{
    font-weight:600;
}

/* ===== REMOVE BUTTON ===== */
.remove-btn{
    background:none;
    border:none;
    font-size:20px;
    cursor:pointer;
    color:#888;
}

.remove-btn:hover{
    color:#000;
}

/* ===== SUMMARY BOX ===== */
.summary-box{
    margin-top:40px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    width:340px;
    margin-left:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.summary-row.total{
    font-size:24px;
    font-weight:700;
}

/* ===== CHECKOUT BUTTON ===== */
.checkout-btn{
    width:100%;
    padding:15px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.checkout-btn:hover{
    background:#333;
}

/* ===== EMPTY CART ===== */
.empty-cart{
    text-align:center;
    padding:50px;
    color:#777;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
.cart-table th:nth-child(2),
.cart-table td:nth-child(2),
.cart-table th:nth-child(3),
.cart-table td:nth-child(3){
display:none;
}

.summary-box{
width:100%;
}
}

</style>
</head>

<body>

<header>
<div class="nav-right">
<span class="cart" onclick="window.location.href='store.php'">Home</span>

<div class="profile-dropdown">
<span class="account-btn">Account ▾</span>

<div class="dropdown-menu">
<button id="logout-btn">Logout</button>
</div>
</div>

</div>
</header>

<div class="cart-wrapper">

<h1>Your Cart (<span id="cart-count">0</span>)</h1>

<table class="cart-table">

<thead>
<tr>
<th>Item</th>
<th>Storage</th>
<th>Color</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th></th>
</tr>
</thead>

<tbody id="cart-items"></tbody>

</table>

<div class="summary-box">

<div class="summary-row total">
<span>Total</span>
<span id="final-total">₱0</span>
</div>

<button class="checkout-btn">Checkout</button>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const cartItemsContainer = document.getElementById("cart-items");
const finalTotal = document.getElementById("final-total");
const cartCount = document.getElementById("cart-count");
const checkoutBtn = document.querySelector(".checkout-btn");

let cart = [];

/* LOAD CART FROM DATABASE */
async function loadCart(){
const res = await fetch('cart_fetch.php');
cart = await res.json();
renderCart();
}

/* RENDER CART */
function renderCart(){

cartItemsContainer.innerHTML = "";

if(cart.length === 0){

cartItemsContainer.innerHTML = `
<tr>
<td colspan="7" class="empty-cart">Your cart is empty</td>
</tr>
`;

finalTotal.textContent = "₱0";
cartCount.textContent = 0;
return;
}

let subtotal = 0;

cart.forEach(item => {

subtotal += Number(item.product_price) * Number(item.quantity);

/* IMAGE PRIORITY
1 admin uploaded image
2 default product image
3 fallback image
*/

let imgSrc = "assets/default.png";

if(item.uploaded_image){
imgSrc = `assets/uploads/${item.uploaded_image}`;
}
else if(item.product_image){
imgSrc = `assets/${item.product_image}`;
}

cartItemsContainer.innerHTML += `
<tr>

<td class="item-cell">
<img src="${imgSrc}" alt="${item.product_name}" onerror="this.src='assets/default.png'">
${item.product_name}
</td>

<td>${item.storage || "-"}</td>

<td>${item.color || "-"}</td>

<td class="price-cell">
₱${Number(item.product_price).toLocaleString()}
</td>

<td>${item.quantity}</td>

<td class="total-cell">
₱${(Number(item.product_price) * Number(item.quantity)).toLocaleString()}
</td>

<td>
<button class="remove-btn" data-id="${item.id}">×</button>

</td>

</tr>
`;
});

finalTotal.textContent = "₱" + subtotal.toLocaleString();

cartCount.textContent = cart.reduce(
(sum,item)=> sum + Number(item.quantity),
0
);

}

/* INITIAL LOAD */
loadCart();

/* REMOVE ITEM */
cartItemsContainer.addEventListener("click", async e => {
    if(e.target.classList.contains("remove-btn")){
        const id = e.target.dataset.id;
        if(!id) return;

       try {
    const response = await fetch('cart_remove.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `id=${id}`
    });
    
    const text = await response.text(); // <-- read raw response
    console.log("Server response:", text); // <-- check browser console

    const data = JSON.parse(text); // parse manually

    if(data.status === "success"){
        alert("Item removed successfully!");
        loadCart();
    } else {
        alert(`Failed to remove item: ${data.message}`);
    }

} catch(err){
    console.error(err);
    alert("Network error. Please check console.");
}
    }
});

/* CHECKOUT */
checkoutBtn.addEventListener("click", async () => {

try{

const res = await fetch('cart_checkout.php',{
method:'POST'
});

const data = await res.json();

if(data.status === "success"){

alert(`Checkout successful!`);
loadCart();

}else{

alert(`Checkout failed: ${data.message}`);

}

}catch(err){

console.error(err);
alert("Network error during checkout.");

}

});

/* ACCOUNT DROPDOWN */
const dropdown = document.querySelector(".dropdown-menu");
const profile = document.querySelector(".profile-dropdown");

profile.addEventListener("click", e => {
e.stopPropagation();
dropdown.style.display =
dropdown.style.display === "block"
? "none"
: "block";
});

document.addEventListener("click", ()=>{
dropdown.style.display = "none";
});

/* LOGOUT */
document.getElementById("logout-btn").addEventListener("click",()=>{
window.location.href = "index.html";
});

});

</script>

</body>
</html>
