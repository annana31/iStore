<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Login</title>
<style>
  body.admin-body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #f0f0f0;
  }

  body.admin-body .login-container {
    background-color: #1e1e1e;
    padding: 48px 40px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.85);
    width: 360px;
    max-width: 90vw;
    text-align: center;
    box-sizing: border-box;
  }

  body.admin-body h1 {
    margin-bottom: 40px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #ffffff;
    font-size: 1.8rem;
  }

  body.admin-body input[type="text"],
  body.admin-body input[type="password"] {
    width: 100%;
    padding: 16px 18px;
    border: 1.8px solid #444;
    border-radius: 10px;
    background-color: #121212;
    color: #eee;
    font-size: 1.1rem;
    transition: border-color 0.3s ease;
    box-sizing: border-box;
  }

  body.admin-body input[type="text"]:focus,
  body.admin-body input[type="password"]:focus {
    outline: none;
    border-color: #888;
  }

  /* Restore spacing between username and password */
  body.admin-body .input-wrapper {
    position: relative;
    margin-top: 20px;
    margin-bottom: 26px;
  }

  /* Eye icon */
  .toggle-password {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    cursor: pointer;
    width: 20px;
    height: 20px;
    fill: #888;
    transition: fill 0.3s;
  }

  .toggle-password:hover {
    fill: #ccc;
  }

  body.admin-body button {
    width: 100%;
    padding: 16px 18px;
    background-color: #f5f5f5;
    color: #121212;
    border: none;
    border-radius: 10px;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    transition: background-color 0.3s ease;
    box-sizing: border-box;
  }

  body.admin-body button:hover {
    background-color: #c2c1c1;
  }

  body.admin-body #error-msg {
    margin-top: 24px;
    font-weight: 600;
    min-height: 1.3em;
    font-size: 1rem;
  }

  /* Fix autofill and focus backgrounds */
  input:-webkit-autofill,
  input:-webkit-autofill:hover, 
  input:-webkit-autofill:focus, 
  input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #121212 inset !important;
      -webkit-text-fill-color: #eee !important;
      transition: background-color 5000s ease-in-out 0s !important;
  }

  input:focus {
      background-color: #121212 !important;
      border-color: #888 !important;
      color: #eee !important;
  }

</style>
</head>
<body class="admin-body">
  <div class="login-container">
    <h1>Admin</h1>
    <form id="loginForm" autocomplete="off">
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Username"
        required
        autocomplete="username"
      />

      <div class="input-wrapper">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          required
          autocomplete="current-password"
        />
        <!-- Professional small eye icon -->
        <svg class="toggle-password" id="togglePassword" viewBox="0 0 24 24">
          <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8.2c-1.8 0-3.2 1.4-3.2 3.2s1.4 3.2 3.2 3.2 3.2-1.4 3.2-3.2-1.4-3.2-3.2-3.2z"/>
        </svg>
      </div>

      <button type="submit">Login</button>
    </form>
    <p id="error-msg"></p>
  </div>

<script>
  // Toggle password visibility
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");

  togglePassword.addEventListener("click", () => {
    const type =
      passwordInput.getAttribute("type") === "password" ? "text" : "password";
    passwordInput.setAttribute("type", type);
  });

  // Login form logic
  document
    .getElementById("loginForm")
    .addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("error-msg");

      if (!username || !password) {
        msg.style.color = "tomato";
        msg.textContent = "Please fill all fields.";
        return;
      }

      const formData = new FormData();
      formData.append("username", username);
      formData.append("password", password);

      fetch("admin_login.php", {
        method: "POST",
        body: formData,
      })
        .then((res) => res.text())
        .then((data) => {
          if (data === "success") {
            msg.style.color = "#4caf50";
            msg.textContent =
              "Admin login successful! Redirecting...";
            setTimeout(() => {
              window.location.href = "adminORDERS.php";
            }, 1000);
          } else if (data === "not_admin") {
            msg.style.color = "tomato";
            msg.textContent =
              "Access denied. Not an admin account.";
          } else {
            msg.style.color = "tomato";
            msg.textContent = "Invalid Credential";
          }
        })
        .catch(() => {
          msg.style.color = "tomato";
          msg.textContent = "Server error.";
        });
    });
</script>

</body>
</html>
